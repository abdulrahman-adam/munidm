services:
  app:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: hfddhjk
      MYSQL_DATABASE: maman
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: